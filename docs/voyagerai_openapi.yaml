openapi: 3.0.3
info:
  title: VoyagerAI API
  description: >
    Multi-agent travel planning platform API. Creating a trip starts an
    asynchronous LangGraph multi-agent run; human-in-the-loop checkpoints
    pause execution until the user approves via /trips/{trip_id}/approve.
    Flight data is served by an internal synthetic flight service (no
    live GDS integration); this is transparent to API consumers since it
    sits behind the same Tool Registry interface a real provider would use.
  version: 0.2.0
servers:
  - url: https://voyagerai-backend.onrender.com/v1
    description: Production (Render free tier — replace with custom domain later)
  - url: http://localhost:8000/v1
    description: Local development

tags:
  - name: system
  - name: auth
  - name: users
  - name: preferences
  - name: trips
  - name: sharing

paths:
  /health:
    get:
      tags: [system]
      summary: Health check
      description: >
        Used by Render's deploy health check and uptime monitoring.
        Returns 200 once the app is ready to accept traffic, including a
        live check that the database and Redis connections are up.
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  database:
                    type: string
                    example: ok
                  redis:
                    type: string
                    example: ok
        '503':
          description: One or more dependencies unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/register:
    post:
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/login:
    post:
      tags: [auth]
      summary: Log in and receive access/refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/refresh:
    post:
      tags: [auth]
      summary: Exchange a refresh token for a new access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: New token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: Refresh token invalid or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/password-reset/request:
    post:
      tags: [auth]
      summary: Request a password reset email
      description: >
        Sent via Resend. Always returns 202, even for unknown emails, to
        avoid leaking which addresses are registered.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '202':
          description: Reset email queued
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/password-reset/confirm:
    post:
      tags: [auth]
      summary: Confirm a password reset using the emailed token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token:
                  type: string
                new_password:
                  type: string
                  format: password
                  minLength: 8
      responses:
        '200':
          description: Password updated
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/me:
    get:
      tags: [users]
      summary: Get the current user's profile
      security: [{bearerAuth: []}]
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    patch:
      tags: [users]
      summary: Update the current user's profile
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /preferences:
    get:
      tags: [preferences]
      summary: Get the current user's travel preferences
      security: [{bearerAuth: []}]
      responses:
        '200':
          description: Preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Preference'
    patch:
      tags: [preferences]
      summary: Update travel preferences
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreferenceUpdate'
      responses:
        '200':
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Preference'

  /trips:
    post:
      tags: [trips]
      summary: Create a trip and start the LangGraph multi-agent run
      description: >
        Returns immediately with status "pending" while the agent graph
        runs asynchronously. Poll /trips/{trip_id}/status for progress.
        Flight results come from the internal synthetic flight service.
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TripCreate'
      responses:
        '202':
          description: Trip accepted, agent run started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '429':
          $ref: '#/components/responses/RateLimited'
    get:
      tags: [trips]
      summary: List the current user's trips
      security: [{bearerAuth: []}]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TripStatus'
      responses:
        '200':
          description: List of trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Trip'

  /trips/{trip_id}:
    get:
      tags: [trips]
      summary: Get a trip by ID
      security: [{bearerAuth: []}]
      parameters:
        - $ref: '#/components/parameters/TripId'
      responses:
        '200':
          description: Trip detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '404':
          description: Trip not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /trips/{trip_id}/status:
    get:
      tags: [trips]
      summary: Poll the live status of the agent run
      description: >
        Reflects the current LangGraph node and, if execution is paused
        at a human-in-the-loop gate, which checkpoint is awaiting approval.
      security: [{bearerAuth: []}]
      parameters:
        - $ref: '#/components/parameters/TripId'
      responses:
        '200':
          description: Current run status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripRunStatus'
        '404':
          description: Trip not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /trips/{trip_id}/approve:
    post:
      tags: [trips]
      summary: Resume a paused graph run at a human-in-the-loop checkpoint
      description: >
        Used for the flight, hotel, and final itinerary approval gates.
        Resumes the LangGraph run from its saved Postgres (Neon) checkpoint.
      security: [{bearerAuth: []}]
      parameters:
        - $ref: '#/components/parameters/TripId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalRequest'
      responses:
        '200':
          description: Run resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '404':
          description: Trip not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Trip is not currently awaiting approval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /trips/{trip_id}/pdf:
    get:
      tags: [trips]
      summary: Download the finalized itinerary as a PDF
      security: [{bearerAuth: []}]
      parameters:
        - $ref: '#/components/parameters/TripId'
      responses:
        '200':
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '404':
          description: Trip not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Trip has no finalized plan yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /trips/{trip_id}/share:
    post:
      tags: [sharing]
      summary: Create a public read-only share link for a trip
      security: [{bearerAuth: []}]
      parameters:
        - $ref: '#/components/parameters/TripId'
      responses:
        '201':
          description: Share link created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripShare'
        '404':
          description: Trip not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /shared/{share_token}:
    get:
      tags: [sharing]
      summary: View a publicly shared trip
      description: No authentication required; intended for read-only public links.
      parameters:
        - name: share_token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Public trip view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trip'
        '404':
          description: Link not found or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TripId:
      name: trip_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    RateLimited:
      description: Too many requests — Redis-based rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      properties:
        detail:
          type: string

    UserCreate:
      type: object
      required: [email, password, full_name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        full_name:
          type: string

    UserUpdate:
      type: object
      properties:
        full_name:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        created_at:
          type: string
          format: date-time

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    TokenPair:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: bearer

    PreferenceUpdate:
      type: object
      properties:
        travel_style:
          type: string
          enum: [budget, balanced, luxury]
        budget_range:
          type: string
        interests:
          type: array
          items:
            type: string

    Preference:
      allOf:
        - $ref: '#/components/schemas/PreferenceUpdate'
        - type: object
          properties:
            user_id:
              type: string
              format: uuid

    TripStatus:
      type: string
      enum: [pending, researching, booking, planning, awaiting_approval, completed, failed]

    TripCreate:
      type: object
      required: [destination, start_date, end_date, budget]
      properties:
        destination:
          type: string
          example: somewhere warm in December
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        budget:
          type: number
          format: float
        origin:
          type: string
          description: Departure city or airport code

    Trip:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        destination:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        budget:
          type: number
        status:
          $ref: '#/components/schemas/TripStatus'
        final_plan:
          type: object
          nullable: true
          description: Structured itinerary, present once status is "completed"
        created_at:
          type: string
          format: date-time

    TripRunStatus:
      type: object
      properties:
        trip_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/TripStatus'
        current_node:
          type: string
          example: review_agent
        awaiting_approval_for:
          type: string
          nullable: true
          enum: [flight, hotel, final_itinerary]

    ApprovalRequest:
      type: object
      required: [checkpoint, decision]
      properties:
        checkpoint:
          type: string
          enum: [flight, hotel, final_itinerary]
        decision:
          type: string
          enum: [approve, reject]
        notes:
          type: string
          nullable: true

    TripShare:
      type: object
      properties:
        trip_id:
          type: string
          format: uuid
        share_token:
          type: string
        url:
          type: string
        expires_at:
          type: string
          format: date-time
